plugins {
    id 'com.android.application'
    id 'kotlin-android'
    // 移除硬编码版本，使用根配置的版本
    id 'kotlinx-serialization'

}
apply plugin: 'kotlin-kapt'

android {
    compileSdk 34
// 升级compileSdk到34（AS 2025.2推荐）
    buildToolsVersion '34.0.0'

    defaultConfig {
        applicationId "com.example.android.wms"
        minSdk 27
        targetSdk 34 // 同步升级targetSdk到34
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        multiDexEnabled true
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    kotlinOptions {
        jvmTarget = '1.8'
    }
    buildFeatures {
        viewBinding true
    }
    // AGP 8.0+ 需显式声明命名空间（替代AndroidManifest的package）
    namespace "com.example.android.wms"
    kapt {
        javacOptions {
            option("-J--add-exports=jdk.compiler/com.sun.tools.javac.main=ALL-UNNAMED")
            option("-J--add-exports=jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED")
        }
        //useCompileDaemon = false // 禁用 Kapt 守护进程，避免冲突
    }
}

dependencies {

    // ========== 核心AndroidX依赖（升级到适配34的版本） ==========
    implementation "androidx.core:core-ktx:1.12.0"
    implementation "androidx.appcompat:appcompat:$rootProject.appCompatVersion"
    implementation "androidx.activity:activity-ktx:$rootProject.activityVersion"
    implementation "com.google.android.material:material:$rootProject.materialVersion"
    implementation "androidx.constraintlayout:constraintlayout:$rootProject.constraintLayoutVersion"
    implementation 'androidx.multidex:multidex:2.0.1'
    implementation 'androidx.mediarouter:mediarouter:1.6.0'
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
    implementation 'androidx.annotation:annotation:1.7.0'

    // ========== Kotlin核心依赖 ==========
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:$kotlin_version"
    api "org.jetbrains.kotlinx:kotlinx-coroutines-core:$rootProject.coroutines"
    api "org.jetbrains.kotlinx:kotlinx-coroutines-android:$rootProject.coroutines"
    // 序列化核心库（适配Kotlin 1.9.20）
    implementation "org.jetbrains.kotlinx:kotlinx-serialization-json:1.6.2"

    // ========== Room依赖（稳定版） ==========
    implementation "androidx.room:room-runtime:$rootProject.roomVersion"
    kapt "androidx.room:room-compiler:$rootProject.roomVersion"
    implementation "androidx.room:room-ktx:$rootProject.roomVersion"
    androidTestImplementation "androidx.room:room-testing:$rootProject.roomVersion"

    // ========== Lifecycle依赖 ==========
    implementation "androidx.lifecycle:lifecycle-viewmodel-ktx:$rootProject.lifecycleVersion"
    implementation "androidx.lifecycle:lifecycle-livedata-ktx:$rootProject.lifecycleVersion"
    implementation "androidx.lifecycle:lifecycle-common-java8:$rootProject.lifecycleVersion"

    // ========== 导航组件（升级到稳定版） ==========
    implementation 'androidx.navigation:navigation-fragment-ktx:2.7.7'
    implementation 'androidx.navigation:navigation-ui-ktx:2.7.7'

    // ========== 第三方库（保持兼容） ==========
    implementation 'io.github.shichuanenhui:swipeback:1.1.0'
    implementation 'net.sourceforge.jtds:jtds:1.3.1'
    implementation files('libs/netty-all-4.1.63.Final.jar')
    implementation files('libs/DataCollection.aar')
    implementation files('libs/tscsdk.jar')
    implementation 'com.facebook.stetho:stetho:1.5.1' // 升级到兼容版
    //implementation 'com.github.zyyoona7:Android-PickerView:4.4.6'
    // 2. 用 AndroidX 替代 Anko 核心功能（按需添加）：
    // Anko Commons → AndroidX Core KTX
    implementation "androidx.core:core-ktx:1.12.0"
    // Anko Layouts → View Binding/Compose
    // Anko Coroutines → Kotlin 协程
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:$rootProject.coroutines"

    // Retrofit/OkHttp（升级到兼容版）
    implementation 'com.squareup.retrofit2:retrofit:2.9.0'
    implementation 'com.squareup.retrofit2:converter-gson:2.9.0'
    implementation 'com.squareup.okhttp3:okhttp:4.12.0' // 升级到稳定版

    // ========== 测试依赖 ==========
    testImplementation "junit:junit:$rootProject.junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$rootProject.androidxJunitVersion"
    androidTestImplementation ("androidx.test.espresso:espresso-core:$rootProject.espressoVersion", {
        exclude group: 'com.android.support', module: 'support-annotations'
    })
    androidTestImplementation "androidx.arch.core:core-testing:$rootProject.coreTestingVersion"

}
